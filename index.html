<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Modern Smooth Style</title>
    
    <style>
        /* รูปแบบสีสันสดใส สไตล์โมเดิร์นพาสเทล น่าใช้งาน */
        :root {
            --bg-gradient: linear-gradient(135deg, #6ee7b7 0%, #3b82f6 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --btn-color: #ec4899;
            --btn-hover: #db2777;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* ปุ่มกดดีไซน์มนโค้ง สดใสเด่นชัด */
        .btn-start {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        .btn-start:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.6);
        }

        .btn-start:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* รูปแบบกล่องกล้องใหม่: ล็อกขนาดสี่เหลี่ยมจัตุรัส 200x200 เท่าเดิม แต่เพิ่มขอบมนให้น่ารักขึ้น */
        .camera-wrapper {
            width: 200px;
            height: 200px;
            background-color: #000000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            margin-bottom: 24px;
            border: 4px solid #ffffff;
        }

        /* แท็กวิดีโอรูปแบบใหม่ เปิดกล้องสดได้เสถียรที่สุด ไม่ขึ้นกล่องขาว */
        #webcam-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* กลับด้านซ้ายขวาให้เหมือนกระจกเงาธรรมชาติ */
        }

        /* กล่องแสดงผลลัพธ์การทำนาย */
        #label-container {
            width: 200px;
            background: var(--card-bg);
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .label-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding: 8px 0;
        }

        .label-item:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: bold;
            color: #475569;
        }

        .class-prob {
            font-weight: 800;
            color: #2563eb;
            background-color: #eff6ff;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="title">Teachable Machine Image Model</div>

<button type="button" class="btn-start" id="start-btn" onclick="init()">Start Camera</button>

<!-- รูปแบบพื้นที่แสดงผลกล้องแบบใหม่ที่เสถียรและราบรื่นที่สุด -->
<div class="camera-wrapper">
    <video id="webcam-video" autoplay playsinline muted></video>
</div>

<!-- กล่องแสดงข้อความผลลัพธ์ -->
<div id="label-container"></div>

<!-- เรียกใช้งานคลังไลบรารีดั้งเดิมของคุณ -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลเดิมของคุณ[cite: 4]
    const URL = "https://teachablemachine.withgoogle.com/models/XJJUyhxtL/";[cite: 4]

    let model, maxPredictions, labelContainer;
    const videoElement = document.getElementById("webcam-video");
    let predictInterval = null;

    async function init() {
        const btn = document.getElementById("start-btn");
        btn.disabled = true;
        btn.innerText = "Connecting...";

        try {
            // 1. โหลดโมเดลวิเคราะห์ภาพจากระบบของ Teachable Machine[cite: 4]
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");[cite: 4]
            maxPredictions = model.getTotalClasses();[cite: 4]

            // 2. รูปแบบการเปิดกล้องใหม่: เรียกผ่านเบราว์เซอร์โดยตรง (Native WebRTC) ป้องกันปัญหากล่องขาว
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 200, height: 200, facingMode: "user" },
                audio: false
            });
            
            // ส่งสัญญาณภาพสดตรงเข้าสู่แท็กวิดีโอทันที
            videoElement.srcObject = stream;

            // 3. จัดเตรียมกล่องข้อความอัปเดตเปอร์เซ็นต์[cite: 4]
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {[cite: 4]
                const div = document.createElement("div");
                div.className = "label-item";
                labelContainer.appendChild(div);[cite: 4]
            }

            btn.innerText = "System Active";

            // 4. สั่งให้ AI แอบมาดึงภาพเฟรมปัจจุบันจากวิดีโอไปทำนายผลลัพธ์ "ทุก ๆ 3 วินาที" (3000 มิลลิวินาที)
            predictInterval = setInterval(predict, 3000);
            
            // สั่งคำนวณรอบแรกทันที
            setTimeout(predict, 500);

        } catch (error) {
            console.error("Camera Error:", error);
            alert("ไม่สามารถเปิดกล้องได้ กรุณาคลิกที่ไอคอนตั้งค่าหน้าชื่อเว็บเพื่ออนุญาตสิทธิ์เข้าถึงกล้อง (Allow Camera)");
            btn.disabled = false;
            btn.innerText = "Start Camera";
        }
    }

    // ฟังก์ชันส่งภาพวิดีโอสดไปให้ AI ประมวลผลลัพธ์
    async function predict() {
        // ดักจับว่าสัญญาณภาพวิดีโอสดพร้อมให้วิเคราะห์หรือยัง
        if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
            // โมเดลสามารถรับแท็กวิดีโอมาตรฐานไปทำนายตรง ๆ ได้ทันที[cite: 4]
            const prediction = await model.predict(videoElement);[cite: 4]
            
            for (let i = 0; i < maxPredictions; i++) {[cite: 4]
                const className = prediction[i].className;[cite: 4]
                const probability = (prediction[i].probability * 100).toFixed(0) + "%";
                
                // จัดเรียงฟอนต์และสีสันให้แยกสัดส่วนสวยงาม สบายตา
                labelContainer.childNodes[i].innerHTML = `
                    <span class="class-name">${className}</span>
                    <span class="class-prob">${probability}</span>
                `;
            }
        }
    }
</script>

</body>
</html>
