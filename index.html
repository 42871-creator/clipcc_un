<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    
    <style>
        /* ตั้งค่าโทนสีสดใส สไตล์พาสเทลเป็นมิตร */
        :root {
            --bg-gradient: linear-gradient(135deg, #ffed4a 0%, #ff7676 100%);
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --btn-color: #ff5252;
            --btn-hover: #ff2a2a;
            --accent-blue: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* กล่องข้อความหัวข้อสีสันสดใส */
        .title {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 24px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ปุ่มกดดีไซน์สดใส น่ากด */
        .btn-start {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px; /* ทำปุ่มทรงมนโค้งดูเป็นมิตร */
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 82, 82, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        .btn-start:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 82, 82, 0.6);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .btn-start:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* กล่องใส่กล้อง ทรงสี่เหลี่ยมจัตุรัสแบบเดิมเป๊ะๆ (200x200) ไม่เปลี่ยนรูปทรง[cite: 2] */
        #webcam-container {
            width: 200px;
            height: 200px;
            margin-bottom: 24px;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            overflow: hidden; /* ป้องกันไม่ให้ภาพล้นขอบ */
        }

        /* บังคับให้ภาพใน canvas ขยายเต็มกรอบ 200x200 อย่างราบรื่น[cite: 2] */
        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* กล่องแสดงข้อความผลลัพธ์พาสเทลมินิมัล */
        #label-container {
            width: 200px;
            font-size: 1rem;
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .label-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding: 6px 0;
        }

        .label-item:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: 600;
            color: #4a5568;
        }

        .class-prob {
            color: var(--btn-color);
            font-weight: bold;
            background: #fff5f5;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="title">Teachable Machine Live</div>

<button type="button" class="btn-start" id="start-btn" onclick="init()">Start Camera</button>

<!-- กล้องทรงเดิมเหลี่ยมจัตุรัส ขนาดเดิม 200x200[cite: 2] -->
<div id="webcam-container"></div>

<!-- กล่องผลลัพธ์แยกข้อความสวยงาม -->
<div id="label-container"></div>

<!-- เรียกสคริปต์หลักจากลิงก์เดิมของคุณ[cite: 2] -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลของคุณ[cite: 2]
    const URL = "https://teachablemachine.withgoogle.com/models/XJJUyhxtL/";[cite: 2]

    let model, webcam, labelContainer, maxPredictions;
    let lastPredictTime = 0; // ตัวแปรคอยจับเวลาล่าสุุดที่ส่งข้อมูลให้ AI

    async function init() {
        // ปิดปุ่มระหว่างดาวน์โหลดโมเดล
        document.getElementById("start-btn").disabled = true;
        document.getElementById("start-btn").innerText = "Loading...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // โหลดโมเดล
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();[cite: 2]

        // เปิดกล้องขนาดเดิม (200x200)[cite: 2]
        const flip = true; 
        webcam = new tmImage.Webcam(200, 200, flip);[cite: 2]
        await webcam.setup();[cite: 2]
        await webcam.play();[cite: 2]

        // เอากล้องสตรีมสดใส่เข้าไปในกล่อง[cite: 2]
        document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 2]
        
        // เคลียร์และสร้างช่องใส่ผลลัพธ์ตัวหนังสือ[cite: 2]
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; 
        for (let i = 0; i < maxPredictions; i++) {[cite: 2]
            const div = document.createElement("div");
            div.className = "label-item";
            labelContainer.appendChild(div);[cite: 2]
        }

        document.getElementById("start-btn").innerText = "System Ready";

        // เริ่มลูปอัปเดตภาพหน้าจอกล้องสด[cite: 2]
        window.requestAnimationFrame(loop);[cite: 2]
    }

    async function loop() {
        webcam.update(); // สั่งอัปเดตเฟรมภาพตลอดเวลาแบบ Real-time เพื่อให้วิดีโอลื่นไหล ไม่ค้าง[cite: 2]
        
        // ตรวจสอบเวลาปัจจุบัน (มิลลิวินาที)
        const currentTime = Date.now();
        
        // ถ้าเวลาปัจจุบันผ่านไปครบ 3000 มิลลิวินาที (3 วินาที) จากรอบล่าสุด ค่อยสั่งส่งภาพไปตรวจจับ
        if (currentTime - lastPredictTime >= 3000) {
            await predict(); // เรียก AI มาประมวลผลคำนวณภาพ[cite: 2]
            lastPredictTime = currentTime; // อัปเดตบันทึกเวลาใหม่ค้างไว้ทำรอบต่อไป
        }
        
        window.requestAnimationFrame(loop); // วนลูปกล้องต่อไปอย่างต่อเนื่อง[cite: 2]
    }

    // ฟังก์ชันทำนายผลลัพธ์
    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 2]
        for (let i = 0; i < maxPredictions; i++) {[cite: 2]
            const className = prediction[i].className;[cite: 2]
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            
            // แทนค่าลงใน UI ตัวหนังสือที่เตรียมไว้ให้สวยงามและเป็นระเบียบ
            labelContainer.childNodes[i].innerHTML = `
                <span class="class-name">${className}</span>
                <span class="class-prob">${probability}</span>
            `;
        }
    }
</script>

</body>
</html>
