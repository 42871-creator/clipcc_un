<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Modern Style</title>
    
    <style>
        /* กำหนดธีมสีพาสเทลและฟอนต์ที่อ่านง่าย */
        :root {
            --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --card-bg: #ffffff;
            --text-main: #334155;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* หัวข้อเว็บ */
        .title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ปุ่มกดดีไซน์โมเดิร์น */
        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 36px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        /* กล่องใส่กล้องเว็บแคม (ขนาด 200x200 เท่าเดิม) */
        #webcam-container {
            width: 200px;
            height: 200px;
            background-color: #f8fafc;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            border: 4px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* บังคับให้ภาพ Canvas เต็มกล่องพอดี */
        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* กล่องแสดงผลลัพธ์ */
        #label-container {
            width: 220px;
            background: var(--card-bg);
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        /* จัดแต่งแถบแสดงคลาสย่อย */
        .label-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding: 8px 0;
            font-size: 1rem;
        }

        .label-item:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: 600;
            color: #475569;
        }

        .class-prob {
            font-weight: bold;
            color: var(--primary-color);
            background-color: #eff6ff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="title">Teachable Machine Image Model</div>

<!-- เปลี่ยนเป็นปุ่มแบบมี ID เพื่อจัดสไตล์ง่ายขึ้น -->
<button type="button" class="btn-start" id="start-btn" onclick="init()">Start System</button>

<!-- พื้นที่แสดงกล้องเว็บแคม -->
<div id="webcam-container"></div>

<!-- พื้นที่แสดงผลลัพธ์การทำนาย -->
<div id="label-container"></div>

<!-- เรียกใช้ไลบรารีตามต้นฉบับของคุณ -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลเดิมของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/XJJUyhxtL/";[cite: 4]

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const btn = document.getElementById("start-btn");
        btn.disabled = true;
        btn.innerText = "Loading...";

        const modelURL = URL + "model.json";[cite: 4]
        const metadataURL = URL + "metadata.json";[cite: 4]

        try {
            // โหลดโมเดลและเมทาดาตา[cite: 4]
            model = await tmImage.load(modelURL, metadataURL);[cite: 4]
            maxPredictions = model.getTotalClasses();[cite: 4]

            // ตั้งค่ากล้องเว็บแคม (ขนาด 200x200 และกลับด้านซ้ายขวา)[cite: 4]
            const flip = true;[cite: 4]
            webcam = new tmImage.Webcam(200, 200, flip);[cite: 4]
            await webcam.setup();[cite: 4]
            await webcam.play();[cite: 4]
            window.requestAnimationFrame(loop);[cite: 4]

            // นำตัวเล่นกล้องไปใส่ใน DOM[cite: 4]
            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 4]
            
            // เตรียมพื้นที่แสดงผลสำหรับแต่ละคลาส[cite: 4]
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // ล้างข้อมูลเก่า (ถ้ามี)
            for (let i = 0; i < maxPredictions; i++) {[cite: 4]
                const div = document.createElement("div");
                div.className = "label-item";
                labelContainer.appendChild(div);[cite: 4]
            }

            btn.innerText = "System Active";

        } catch (error) {
            console.error(error);
            alert("ไม่สามารถเปิดกล้องได้ กรุณาตรวจสอบการอนุญาตให้เข้าถึงกล้องถ่ายรูป");
            btn.disabled = false;
            btn.innerText = "Start System";
        }
    }

    async function loop() {
        webcam.update();[cite: 4]
        await predict();[cite: 4]
        window.requestAnimationFrame(loop);[cite: 4]
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 4]
        for (let i = 0; i < maxPredictions; i++) {[cite: 4]
            const className = prediction[i].className;[cite: 4]
            // แปลงค่าความน่าจะเป็นให้อยู่ในรูปเปอร์เซ็นต์แบบไม่มีทศนิยมเพื่อให้ดูง่าย
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            
            // แสดงผลลัพธ์แยกชื่อคลาสและเปอร์เซ็นต์ซ้าย-ขวาอย่างสวยงาม
            labelContainer.childNodes[i].innerHTML = `
                <span class="class-name">${className}</span>
                <span class="class-prob">${probability}</span>
            `;
        }
    }
</script>

</body>
</html>
