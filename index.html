<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Standard Safe Fix</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --card-bg: #ffffff;
            --text-main: #334155;
            --primary-color: #2563eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
        }

        .title {
            font-size: 1.5rem; font-weight: bold; color: #1e3a8a; margin-bottom: 20px; text-transform: uppercase;
        }

        .status-badge {
            background-color: #f1f5f9; color: #64748b; padding: 6px 16px; border-radius: 50px;
            font-weight: bold; font-size: 0.9rem; margin-bottom: 20px; border: 1px solid #e2e8f0;
        }

        #webcam-container {
            width: 200px; height: 200px; background-color: #ffffff; border-radius: 16px;
            overflow: hidden; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); margin-bottom: 24px;
            border: 4px solid #ffffff; display: flex; align-items: center; justify-content: center;
        }

        #webcam-container canvas {
            width: 100% !important; height: 100% !important; object-fit: cover;
        }

        #label-container {
            width: 220px; background: var(--card-bg); padding: 16px; border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .label-item {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #f1f5f9; padding: 8px 0;
        }

        .label-item:last-child { border-bottom: none; }
        .class-name { font-weight: 600; color: #475569; }
        .class-prob {
            font-weight: bold; color: var(--primary-color); background-color: #eff6ff;
            padding: 2px 8px; border-radius: 20px; font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="title">Teachable Machine Image Model</div>
<div class="status-badge" id="status-text">ระบบกำลังเริ่มทำงานอัตโนมัติ...</div>

<div id="webcam-container"></div>
<div id="label-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/XJJUyhxtL/";

    let model, webcam, labelContainer, maxPredictions;

    // บังคับให้ระบบรันตั้งแต่เสี้ยววินาทีแรกที่เปิดเว็บขึ้นมา (ข้ามผ่านขั้นตอนคลิกปุ่มเพื่อเลี่ยงปัญหาสิทธิ์ค้าง)
    window.onload = async function() {
        const statusText = document.getElementById("status-text");
        
        try {
            // STEP 1: เรียกใช้สิทธิ์กล้องของตัวเบราว์เซอร์ล่วงหน้าก่อนเลย
            statusText.innerText = "กำลังเข้าถึงกล้องเว็บแคม...";
            const streamTest = await navigator.mediaDevices.getUserMedia({ video: true });
            streamTest.getTracks().forEach(track => track.stop()); // ปิดตัวทดสอบเมื่อรู้ว่าผ่าน

            // STEP 2: โหลดโครงสร้างโมเดลหลัก
            statusText.innerText = "กำลังดาวน์โหลดไฟล์โมเดล AI...";
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            // STEP 3: ส่งสิทธิ์ให้ Teachable Machine สร้าง Canvas กล้องขนาด 200x200
            statusText.innerText = "กำลังประมวลผลวิดีโอสด...";
            webcam = new tmImage.Webcam(200, 200, true);
            await webcam.setup(); 
            await webcam.play();
            
            // แสดงหน้าจอกล้องลงบนเว็บ
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // เตรียมกล่องคำตอบ
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.className = "label-item";
                labelContainer.appendChild(div);
            }

            statusText.style.color = "#10b981";
            statusText.style.backgroundColor = "#ecfdf5";
            statusText.innerText = "● กล้องพร้อมทำงานเรียบร้อย";
            
            window.requestAnimationFrame(loop);

        } catch (error) {
            console.error(error);
            statusText.style.color = "#ef4444";
            statusText.style.backgroundColor = "#fef2f2";
            statusText.innerHTML = `❌ เกิดข้อผิดพลาด: ${error.name}`;
            alert("กล้องถูกบล็อกโดยระบบรักษาความปลอดภัย กรุณาตรวจเช็คการอนุญาตที่หน้าชื่อเว็บอีกครั้ง");
        }
    };

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = `
                <span class="class-name">${className}</span>
                <span class="class-prob">${probability}</span>
            `;
        }
    }
</script>

</body>
</html>
