<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Smooth Neon Mint</title>
    
    <style>
        /* กำหนดโทนสีสดใส สไตล์ Neon Mint & Playful */
        :root {
            --bg-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --btn-color: #00f2fe;
            --btn-hover: #00c6ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* หัวข้อสีสันสดใส */
        .title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* ปุ่มกดมนโค้ง สไตล์โมเดิร์นป๊อป */
        .btn-start {
            background-color: var(--card-bg);
            color: #00a3e0;
            border: none;
            padding: 14px 38px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 24px;
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.25);
        }

        .btn-start:active {
            transform: translateY(-1px);
        }

        .btn-start:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* กล่องใส่กล้องเว็บแคม ทรงจัตุรัสเดิมของคุณ 200x200 */
        #webcam-container {
            width: 200px;
            height: 200px;
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #ffffff;
        }

        /* บังคับภาพแคนวาสของระบบให้เต็มจอและไหลลื่น */
        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* กล่องแสดงผลลัพธ์คลาสแยกสัดส่วนชัดเจน */
        #label-container {
            width: 200px;
            background: var(--card-bg);
            padding: 18px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            min-height: 40px;
        }

        .label-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding: 8px 0;
        }

        .label-item:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: bold;
            color: #475569;
        }

        .class-prob {
            font-weight: 800;
            color: #00bab3;
            background-color: #e6fffa;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="title">Teachable Machine Image Model</div>

<button type="button" class="btn-start" id="start-btn" onclick="init()">Start Camera</button>

<!-- กล่องกล้องจัตุรัส 200x200[cite: 4] -->
<div id="webcam-container"></div>

<!-- กล่องแสดงผลตัวหนังสือและเปอร์เซ็นต์แบบแยกสไตล์ -->
<div id="label-container"></div>

<!-- เรียกใช้งานคลังไลบรารีชุดเดิมของคุณ[cite: 4] -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดล Teachable Machine ดั้งเดิมของคุณ[cite: 4]
    const URL = "https://teachablemachine.withgoogle.com/models/XJJUyhxtL/";[cite: 4]

    let model, webcam, labelContainer, maxPredictions;
    let lastPredictTime = 0; // บันทึกเวลาล่าสุุดที่เรียกใช้ AI คำนวณ

    async function init() {
        const btn = document.getElementById("start-btn");
        btn.disabled = true;
        btn.innerText = "Loading...";

        const modelURL = URL + "model.json";[cite: 4]
        const metadataURL = URL + "metadata.json";[cite: 4]

        try {
            // 1. โหลดโมเดลภาพ[cite: 4]
            model = await tmImage.load(modelURL, metadataURL);[cite: 4]
            maxPredictions = model.getTotalClasses();[cite: 4]

            // 2. ตั้งค่ากล้องเว็บแคมขนาดเดิม (200x200)[cite: 4]
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip);[cite: 4]
            await webcam.setup();[cite: 4]
            await webcam.play();[cite: 4]
            
            // นำภาพกล้องไปแปะไว้ในกล่องหน้าจอ[cite: 4]
            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 4]

            // 3. จัดการโครงสร้างกล่องข้อความผลลัพธ์ให้สวยงาม[cite: 4]
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {[cite: 4]
                const div = document.createElement("div");
                div.className = "label-item";
                labelContainer.appendChild(div);[cite: 4]
            }

            btn.innerText = "Camera Active";
            window.requestAnimationFrame(loop);[cite: 4]

        } catch (error) {
            console.error("Error starting application:", error);
            alert("ไม่สามารถเปิดกล้องได้ กรุณาตรวจสอบสิทธิ์การใช้งานกล้องบนเบราว์เซอร์ของคุณ");
            btn.disabled = false;
            btn.innerText = "Start Camera";
        }
    }

    async function loop() {
        webcam.update(); // บังคับอัปเดตสตรีมวิดีโอตลอดเวลา ช่วยให้กล้องขยับได้ลื่นไหล ไม่ค้าง[cite: 4]
        
        const currentTime = Date.now();
        // เงื่อนไข: จะส่งภาพไปตรวจจับก็ต่อเมื่อเวลาผ่านไปครบทุกๆ 3000 มิลลิวินาที (3 วินาที)
        if (currentTime - lastPredictTime >= 3000) {
            await predict(); // เรียก AI มาประมวลผล[cite: 4]
            lastPredictTime = currentTime; // บันทึกเวลาล่าสุดใหม่
        }
        
        window.requestAnimationFrame(loop);[cite: 4]
    }

    async function predict() {
        // ประมวลผลจากหน้าจอแคนวาสของระบบ[cite: 4]
        const prediction = await model.predict(webcam.canvas);[cite: 4]
        for (let i = 0; i < maxPredictions; i++) {[cite: 4]
            const className = prediction[i].className;[cite: 4]
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            
            // แสดงข้อความแบ่งคลาสและเปอร์เซ็นต์อย่างเป็นระเบียบสวยงาม
            labelContainer.childNodes[i].innerHTML = `
                <span class="class-name">${className}</span>
                <span class="class-prob">${probability}</span>
            `;
        }
    }
</script>

</body>
</html>
