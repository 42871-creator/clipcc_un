<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk AI Classifier (3s Capture)</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', Courier, monospace, sans-serif;
            background-color: #0a0a0c;
            color: #00ff66;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .cyber-box {
            background: #121216;
            border: 2px solid #00ff66;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            border-radius: 4px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }

        /* ตกแต่งมุมกล่องสไตล์ Sci-Fi */
        .cyber-box::before {
            content: "SYSTEM: READY";
            position: absolute;
            top: 4px;
            left: 8px;
            font-size: 0.65rem;
            color: rgba(0, 255, 102, 0.5);
        }

        h1 {
            font-size: 1.3rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .cyber-btn {
            background: transparent;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 12px;
            width: 100%;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .cyber-btn:hover {
            background: #00ff66;
            color: #0a0a0c;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.6);
        }

        .cyber-btn:disabled {
            border-color: #333;
            color: #333;
            background: transparent;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* แถบนับถอยหลัง 3 วินาทีด้านบนกล้อง */
        .timer-track {
            width: 200px;
            height: 4px;
            background: #222;
            margin: 20px auto 4px auto;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: #00f0ff;
            box-shadow: 0 0 8px #00f0ff;
            /* อนิเมชั่นลดแถบเวลาถอยหลังแบบละมุน */
            transition: width 3s linear; 
        }

        .camera-viewport {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px auto;
            border: 1px dashed #00ff66;
            background: #181820;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .camera-viewport canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 102, 0.4);
            box-shadow: 0 0 8px #00ff66;
            animation: scan 2s infinite linear;
            display: none;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .data-display {
            background: #15151c;
            border-left: 3px solid #00f0ff;
            padding: 15px;
            display: none;
        }

        .data-row {
            margin-bottom: 12px;
        }

        .data-row:last-child {
            margin-bottom: 0;
        }

        .data-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #00f0ff;
        }

        .matrix-track {
            background: #222;
            height: 6px;
        }

        .matrix-fill {
            height: 100%;
            width: 0%;
            background: #00f0ff;
            box-shadow: 0 0 6px #00f0ff;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

<div class="cyber-box">
    <h1>[ CORE_CLASSIFIER ]</h1>
    
    <button type="button" class="cyber-btn" id="init-btn" onclick="bootSystem()">ENGAGE CORE</button>
    
    <!-- แถบเวลาถอยหลัง -->
    <div class="timer-track" id="t-track">
        <div class="timer-bar" id="t-bar"></div>
    </div>

    <div class="camera-viewport">
        <div class="scan-line" id="scanner"></div>
        <div id="webcam-node" style="font-size: 0.75rem; color: #444;">[ OFFLINE ]</div>
    </div>
    
    <div class="data-display" id="log-display">
        <!-- ผลลัพธ์โมเดลจะเจาะเข้ามาตรงนี้ -->
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/XJJUyhxtL/";[cite: 2]

    let netModel, camFeed, classCount;

    async function bootSystem() {
        const btn = document.getElementById("init-btn");
        btn.disabled = true;
        btn.innerText = "LOADING CORE...";

        try {
            // โหลดโมเดล
            netModel = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");[cite: 2]
            classCount = netModel.getTotalClasses();[cite: 2]

            // เปิดกล้อง
            camFeed = new tmImage.Webcam(200, 200, true);[cite: 2]
            await camFeed.setup();[cite: 2]
            await camFeed.play();[cite: 2]

            // ฝังกล้องและเปิดเอฟเฟกต์ไซไฟ
            const node = document.getElementById("webcam-node");
            node.innerHTML = "";
            node.appendChild(camFeed.canvas);[cite: 2]
            
            document.getElementById("scanner").style.display = "block";
            document.getElementById("t-track").style.display = "block";
            btn.innerText = "SYSTEM ACTIVE";

            buildLogUI();
            
            // สั่งรันวิเคราะห์รอบแรก
            triggerPulse();

        } catch (e) {
            console.error(e);
            btn.disabled = false;
            btn.innerText = "RETRY CORE";
        }
    }

    function buildLogUI() {
        const display = document.getElementById("log-display");
        display.innerHTML = "";
        display.style.display = "block";

        for (let i = 0; i < classCount; i++) {[cite: 2]
            const row = document.createElement("div");
            row.className = "data-row";
            row.innerHTML = `
                <div class="data-text">
                    <span class="c-name">ANALYZING...</span>
                    <span class="c-val">0%</span>
                </div>
                <div class="matrix-track">
                    <div class="matrix-fill"></div>
                </div>
            `;
            display.appendChild(row);
        }
    }

    // ฟังก์ชันรันลูปการคำนวณและทำอนิเมชั่นถอยหลัง 3 วินาที
    async function triggerPulse() {
        // รีเซ็ตแถบเวลากลับไปเต็มร้อยทันที
        const bar = document.getElementById("t-bar");
        bar.style.transition = "none";
        bar.style.width = "100%";
        
        // บังคับให้เบราว์เซอร์รับรู้การเคลียร์สไตล์ก่อนเริ่มนับถอยหลังใหม่
        bar.offsetHeight; 

        // เริ่มต้นหดแถบเวลาถอยหลังในเวลา 3 วินาที (3000ms)
        bar.style.transition = "width 3s linear";
        bar.style.width = "0%";

        // ถ่ายรูปเฟรมปัจจุบันและวิเคราะห์[cite: 2]
        if (camFeed) {
            camFeed.update();[cite: 2]
            const reports = await netModel.predict(camFeed.canvas);[cite: 2]
            const rows = document.getElementById("log-display").childNodes;

            for (let i = 0; i < classCount; i++) {[cite: 2]
                const name = reports[i].className;[cite: 2]
                const probability = reports[i].probability;[cite: 2]
                const pct = (probability * 100).toFixed(0) + "%";

                rows[i].querySelector(".c-name").innerText = `> ${name}`;
                rows[i].querySelector(".c-val").innerText = pct;
                rows[i].querySelector(".matrix-fill").style.width = pct;
            }
        }

        // ใช้ setTimeout วิ่งซ้ำแทน setInterval เพื่อให้ Sync สอดคล้องกับตัวบาร์เวลาถอยหลัง
        setTimeout(triggerPulse, 3000);
    }
</script>

</body>
</html>
