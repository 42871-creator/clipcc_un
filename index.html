<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffed4a 0%, #ff7676 100%);
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --btn-color: #ff5252;
            --btn-hover: #ff2a2a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .title {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 24px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-start {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 82, 82, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        .btn-start:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 82, 82, 0.6);
        }

        .btn-start:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #webcam-container {
            width: 200px;
            height: 200px;
            margin-bottom: 24px;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #label-container {
            width: 200px;
            font-size: 1rem;
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            min-height: 40px;
        }

        .label-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding: 6px 0;
        }

        .label-item:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: 600;
            color: #4a5568;
        }

        .class-prob {
            color: var(--btn-color);
            font-weight: bold;
            background: #fff5f5;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="title">Teachable Machine Live</div>

<button type="button" class="btn-start" id="start-btn" onclick="init()">Start Camera</button>

<div id="webcam-container"></div>

<div id="label-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/XJJUyhxtL/";[cite: 3]

    let model, webcam, labelContainer, maxPredictions;
    let lastPredictTime = 0; 

    async function init() {
        document.getElementById("start-btn").disabled = true;
        document.getElementById("start-btn").innerText = "Loading...";

        const modelURL = URL + "model.json";[cite: 3]
        const metadataURL = URL + "metadata.json";[cite: 3]

        try {
            model = await tmImage.load(modelURL, metadataURL);[cite: 3]
            maxPredictions = model.getTotalClasses();[cite: 3]

            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip);[cite: 3]
            await webcam.setup();[cite: 3]
            await webcam.play();[cite: 3]

            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 3]
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 
            for (let i = 0; i < maxPredictions; i++) {[cite: 3]
                const div = document.createElement("div");
                div.className = "label-item";
                labelContainer.appendChild(div);[cite: 3]
            }

            document.getElementById("start-btn").innerText = "System Active";
            window.requestAnimationFrame(loop);[cite: 3]

        } catch (error) {
            console.error(error);
            alert("เกิดข้อผิดพลาดในการเปิดกล้อง");
            document.getElementById("start-btn").disabled = false;
            document.getElementById("start-btn").innerText = "Start Camera";
        }
    }

    async function loop() {
        webcam.update();[cite: 3]
        
        const currentTime = Date.now();
        if (currentTime - lastPredictTime >= 3000) {
            await predict(); 
            lastPredictTime = currentTime; 
        }
        
        window.requestAnimationFrame(loop);[cite: 3]
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 3]
        for (let i = 0; i < maxPredictions; i++) {[cite: 3]
            const className = prediction[i].className;[cite: 3]
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            
            labelContainer.childNodes[i].innerHTML = `
                <span class="class-name">${className}</span>
                <span class="class-prob">${probability}</span>
            `;
        }
    }
</script>

</body>
</html>
