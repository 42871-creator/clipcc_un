<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classifier (Every 3 Seconds)</title>
    
    <!-- สไตล์แบบ Glassmorphism สวยล้ำสมัย -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        .btn-action {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            opacity: 0.95;
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-action:disabled {
            background: #334155;
            color: #64748b;
            box-shadow: none;
            cursor: not-allowed;
        }

        .viewscreen {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 24px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .viewscreen canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .status-dot {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 8px #ef4444;
        }

        .status-dot.active {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .results-panel {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 16px;
            padding: 16px;
            margin-top: 24px;
        }

        .class-row {
            margin-bottom: 14px;
        }

        .class-row:last-child {
            margin-bottom: 0;
        }

        .class-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #cbd5e1;
        }

        .gauge-track {
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .gauge-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #3b82f6, #6366f1);
            border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>Image Classifier AI</h1>
        <p>วิเคราะห์ภาพอัตโนมัติในทุกๆ 3 วินาที</p>
    </div>

    <button type="button" class="btn-action" id="power-btn" onclick="startApp()">
        เริ่มต้นเปิดระบบ
    </button>
    
    <div class="viewscreen">
        <div class="status-dot" id="indicator"></div>
        <div id="webcam-area" style="color: #64748b; font-size: 0.85rem;">ระบบกล้องปิดอยู่</div>
    </div>
    
    <div class="results-panel" id="analytics-panel" style="display: none;">
        <!-- แถบประมวลผลข้อมูลจะสร้างขึ้นมาในนี้ -->
    </div>
</div>

<!-- โหลด TensorFlow และ Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // โมเดล URL ตามเป้าหมายของคุณ
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/XJJUyhxtL/";[cite: 2]

    let aiModel, liveCamera, totalClasses;
    let loopTracker = null;

    async function startApp() {
        const btn = document.getElementById("power-btn");
        btn.disabled = true;
        btn.innerText = "กำลังเชื่อมต่อโมเดล...";

        try {
            // 1. โหลด AI Model
            aiModel = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");[cite: 2]
            totalClasses = aiModel.getTotalClasses();[cite: 2]

            // 2. ตั้งค่าการเปิดใช้งานกล้อง
            liveCamera = new tmImage.Webcam(220, 220, true);[cite: 2]
            await liveCamera.setup();[cite: 2]
            await liveCamera.play();[cite: 2]

            // 3. ฝังกล้องลงหน้าจอเว็บ
            const webcamArea = document.getElementById("webcam-area");
            webcamArea.innerHTML = "";
            webcamArea.appendChild(liveCamera.canvas);[cite: 2]

            // 4. แสดงสถานะและไฟสีเขียวกระพริบ
            document.getElementById("indicator").classList.add("active");
            btn.innerText = "ระบบกำลังทำงาน...";

            // 5. เตรียมพื้นที่ UI แสดงการวิเคราะห์แยกแยะคลาส
            buildAnalyticsUI();

            // 6. รันครั้งแรกทันที และ สั่งให้รันซ้ำในทุกๆ 3 วินาที
            processFrame();
            loopTracker = setInterval(processFrame, 3000);

        } catch (error) {
            console.error("เกิดข้อผิดพลาดในการเปิดระบบ:", error);
            btn.disabled = false;
            btn.innerText = "ลองใหม่อีกครั้ง";
        }
    }

    function buildAnalyticsUI() {
        const panel = document.getElementById("analytics-panel");
        panel.innerHTML = "";
        panel.style.display = "block";

        for (let i = 0; i < totalClasses; i++) {[cite: 2]
            const div = document.createElement("div");
            div.className = "class-row";
            div.innerHTML = `
                <div class="class-meta">
                    <span class="label-name">กำลังตรวจสอบ...</span>
                    <span class="label-val">0%</span>
                </div>
                <div class="gauge-track">
                    <div class="gauge-bar"></div>
                </div>
            `;
            panel.appendChild(div);
        }
    }

    async function processFrame() {
        if (liveCamera) {
            liveCamera.update(); // ถ่ายรูปจากกล้องในเสี้ยววินาทีนั้น[cite: 2]
            
            // ส่งภาพให้ AI คำนวณ[cite: 2]
            const predictions = await aiModel.predict(liveCamera.canvas);[cite: 2]
            const rows = document.getElementById("analytics-panel").childNodes;

            // นำผลลัพธ์ไปเรนเดอร์ในสไตล์บาร์กราฟ
            for (let i = 0; i < totalClasses; i++) {[cite: 2]
                const name = predictions[i].className;[cite: 2]
                const score = predictions[i].probability;[cite: 2]
                const scorePercent = (score * 100).toFixed(0) + "%";

                rows[i].querySelector(".label-name").innerText = name;
                rows[i].querySelector(".label-val").innerText = scorePercent;
                rows[i].querySelector(".gauge-bar").style.width = scorePercent;
            }
        }
    }
</script>

</body>
</html>
